<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>DriveGuard AI Ultra</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
  background:#02040c;
  color:#fff;
  overflow:hidden;
}
#map{position:fixed;inset:0;z-index:1}
.glass{
  background:rgba(5,10,25,.82);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 20px 70px rgba(0,0,0,.55);
}
.top{
  position:absolute;z-index:999;top:10px;left:10px;right:10px;
  border-radius:26px;padding:14px;
}
.logo{display:flex;justify-content:space-between;align-items:center;font-size:21px;font-weight:900}
.logo span{font-size:11px;background:linear-gradient(135deg,#00e5ff,#7c4dff);padding:5px 9px;border-radius:999px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.card{background:rgba(255,255,255,.07);border-radius:18px;padding:10px;text-align:center}
.val{font-size:23px;font-weight:900}
.lab{font-size:10px;color:#aab5d8}
.ai{margin-top:10px;font-size:13px;line-height:1.4;color:#dfe6ff}
.controls{
  position:absolute;z-index:999;right:10px;top:220px;display:flex;flex-direction:column;gap:9px
}
button{
  border:0;color:#fff;font-weight:800;border-radius:17px;padding:12px;
  background:rgba(5,10,25,.88);border:1px solid rgba(255,255,255,.13)
}
.alert{
  position:absolute;z-index:1000;left:12px;right:12px;bottom:20px;
  display:none;border-radius:26px;padding:18px;
  background:linear-gradient(135deg,#ff1744,#ff9800);
  box-shadow:0 25px 80px rgba(255,23,68,.55)
}
.alert h2{font-size:21px;margin-bottom:5px}
.alert p{font-size:14px}
.hud{
  position:absolute;z-index:998;left:12px;bottom:105px;
  width:135px;height:135px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle,rgba(0,229,255,.22),rgba(5,10,25,.86));
  border:2px solid rgba(0,229,255,.45)
}
.hud .s{font-size:42px;font-weight:950}
.hud .t{font-size:11px;color:#bdefff}
.bottom{
  position:absolute;z-index:998;left:158px;right:12px;bottom:105px;
  border-radius:22px;padding:12px;font-size:12px;line-height:1.35;color:#dfe6ff
}
.dark body{}
.night #map{filter:brightness(.68) contrast(1.25) saturate(.75)}
</style>
</head>
<body>

<div id="map"></div>

<div class="top glass">
  <div class="logo">DriveGuard AI Ultra <span>SAFE MODE</span></div>
  <div class="stats">
    <div class="card"><div class="val" id="speed">0</div><div class="lab">HIZ</div></div>
    <div class="card"><div class="val" id="limit">--</div><div class="lab">LİMİT</div></div>
    <div class="card"><div class="val" id="dist">--</div><div class="lab">MESAFE</div></div>
    <div class="card"><div class="val" id="risk">0</div><div class="lab">RİSK</div></div>
  </div>
  <div class="ai" id="aiText">Sistem hazır. Konum izni verildiğinde AI güvenli sürüş analizi başlayacak.</div>
</div>

<div class="controls">
  <button onclick="startTrack()">BAŞLAT</button>
  <button onclick="toggleVoice()">SES <span id="voiceText">AÇIK</span></button>
  <button onclick="toggleNight()">GECE</button>
  <button onclick="goMe()">KONUM</button>
  <button onclick="addPoint()">NOKTA EKLE</button>
</div>

<div class="hud glass">
  <div class="s" id="hudSpeed">0</div>
  <div class="t">KM/S</div>
</div>

<div class="bottom glass" id="routeBox">
  Rota güvenlik paneli: En yakın EDS, okul bölgesi, kavşak ve riskli alanlar burada analiz edilir.
</div>

<div class="alert" id="alertBox">
  <h2 id="alertTitle">Uyarı</h2>
  <p id="alertMsg">Yaklaşan güvenlik noktası.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, meMarker, meCircle;
let currentLat=null,currentLng=null;
let voice=true,lastWarn=0;
let userPoints=JSON.parse(localStorage.getItem("dg_points")||"[]");

let points=[
{name:"EDS Hız Kamerası",lat:38.6191,lng:27.4289,limit:50,type:"camera",note:"Elektronik hız kontrol bölgesi"},
{name:"Okul Bölgesi",lat:38.6212,lng:27.4241,limit:30,type:"school",note:"Yaya ve öğrenci geçişi yoğun"},
{name:"Tehlikeli Kavşak",lat:38.6157,lng:27.4315,limit:50,type:"danger",note:"Kaza riski yüksek kavşak"},
{name:"Ortalama Hız Koridoru",lat:38.6260,lng:27.4352,limit:70,type:"avg",note:"Sabit hız ve mesafe kontrol alanı"},
...userPoints
];

function init(){
 map=L.map("map").setView([38.6191,27.4289],14);
 L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);
 drawPoints();
}

function drawPoints(){
 points.forEach(p=>{
  let c=p.type==="school"?"#00e5ff":p.type==="danger"?"#ff1744":p.type==="avg"?"#ff9800":p.type==="user"?"#00ff90":"#7c4dff";
  let icon=L.divIcon({
   html:`<div style="width:25px;height:25px;border-radius:50%;background:${c};border:3px solid white;box-shadow:0 0 20px ${c}"></div>`,
   className:"",iconSize:[25,25]
  });
  L.marker([p.lat,p.lng],{icon}).addTo(map).bindPopup(`<b>${p.name}</b><br>${p.note}<br>Limit: ${p.limit} km/s`);
 });
}

function startTrack(){
 if(!navigator.geolocation){alert("Konum desteklenmiyor.");return;}
 navigator.geolocation.watchPosition(pos=>{
  let lat=pos.coords.latitude,lng=pos.coords.longitude;
  let speed=Math.round((pos.coords.speed||0)*3.6);
  let acc=pos.coords.accuracy;
  currentLat=lat;currentLng=lng;
  drawMe(lat,lng,acc);
  analyze(lat,lng,speed);
 },e=>alert("Konum izni gerekli: "+e.message),{
  enableHighAccuracy:true,maximumAge:1000,timeout:10000
 });
}

function drawMe(lat,lng,acc){
 if(!meMarker){
  meMarker=L.marker([lat,lng]).addTo(map).bindPopup("Konumun");
  meCircle=L.circle([lat,lng],{radius:acc,color:"#00ff90",fillColor:"#00ff90",fillOpacity:.13}).addTo(map);
  map.setView([lat,lng],16);
 }else{
  meMarker.setLatLng([lat,lng]);
  meCircle.setLatLng([lat,lng]);
  meCircle.setRadius(acc);
 }
}

function analyze(lat,lng,speed){
 document.getElementById("speed").innerText=speed;
 document.getElementById("hudSpeed").innerText=speed;

 let nearest=null,nd=999999;
 points.forEach(p=>{
  let d=dist(lat,lng,p.lat,p.lng);
  if(d<nd){nd=d;nearest=p;}
 });

 let limit=nearest?nearest.limit:50;
 let risk=0;
 if(nd<1200)risk+=15;
 if(nd<700)risk+=20;
 if(nd<350)risk+=25;
 if(speed>limit)risk+=25;
 if(speed>limit+15)risk+=15;
 if(nearest && nearest.type==="school")risk+=15;
 if(nearest && nearest.type==="danger")risk+=20;
 risk=Math.min(100,risk);

 document.getElementById("limit").innerText=limit;
 document.getElementById("dist").innerText=Math.round(nd)+"m";
 document.getElementById("risk").innerText=risk;

 let ai=`AI Analiz: ${nearest.name} yaklaşık ${Math.round(nd)} metre ileride. `;
 if(speed>limit) ai+=`Hız limitinin üzerindesin. Güvenli şekilde yavaşla.`;
 else if(nd<500) ai+=`Yaklaşan dikkat noktası var. Kontrollü ilerle.`;
 else ai+=`Sürüş stabil. Risk düşük.`;

 document.getElementById("aiText").innerText=ai;
 document.getElementById("routeBox").innerText=`En yakın nokta: ${nearest.name} • Tip: ${nearest.type.toUpperCase()} • Limit: ${limit} km/s • AI risk: ${risk}/100`;

 if(speed>limit) warn("Hız Uyarısı",`Mevcut hız ${speed} km/s. Limit ${limit} km/s.`,"Hız limitinin üzerindesin. Güvenli şekilde yavaşla.");
 else if(nd<500) warn(nearest.name,`${Math.round(nd)} metre sonra. ${nearest.note}`,"Yaklaşan güvenlik noktası var. Dikkatli ilerle.");
}

function warn(title,msg,vmsg){
 let now=Date.now();
 if(now-lastWarn<10000)return;
 lastWarn=now;
 document.getElementById("alertTitle").innerText=title;
 document.getElementById("alertMsg").innerText=msg;
 document.getElementById("alertBox").style.display="block";
 if(voice)say(vmsg);
 if(navigator.vibrate)navigator.vibrate([250,120,250]);
 setTimeout(()=>document.getElementById("alertBox").style.display="none",6500);
}

function say(t){
 if(!("speechSynthesis" in window))return;
 let u=new SpeechSynthesisUtterance(t);
 u.lang="tr-TR";u.rate=.95;
 speechSynthesis.cancel();speechSynthesis.speak(u);
}

function toggleVoice(){
 voice=!voice;
 document.getElementById("voiceText").innerText=voice?"AÇIK":"KAPALI";
}

function toggleNight(){
 document.body.classList.toggle("night");
}

function goMe(){
 if(currentLat&&currentLng)map.setView([currentLat,currentLng],16);
}

function addPoint(){
 if(!currentLat||!currentLng){alert("Önce konum alınmalı.");return;}
 let name=prompt("Nokta adı:","Dikkat Noktası");
 if(!name)return;
 let p={name,lat:currentLat,lng:currentLng,limit:50,type:"user",note:"Kullanıcı tarafından eklenen güvenlik noktası"};
 userPoints.push(p);
 localStorage.setItem("dg_points",JSON.stringify(userPoints));
 alert("Nokta eklendi. Sayfayı yenileyince haritada görünür.");
}

function dist(lat1,lon1,lat2,lon2){
 let R=6371000;
 let dLat=(lat2-lat1)*Math.PI/180;
 let dLon=(lon2-lon1)*Math.PI/180;
 let a=Math.sin(dLat/2)**2+
 Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

init();
</script>
</body>
</html>
