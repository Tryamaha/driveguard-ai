<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DriveGuard">
<meta name="theme-color" content="#07111f">
<title>DriveGuard AI V11 Live</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
width:100%;height:100%;overflow:hidden;background:#07111f;color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
#map{
position:fixed;inset:0;z-index:1;background:#07111f;
filter:brightness(1.04) contrast(1.08) saturate(1.08);
}
.mapShade{
position:fixed;inset:0;z-index:2;pointer-events:none;
background:linear-gradient(to bottom,rgba(2,7,19,.18),rgba(2,7,19,.04),rgba(2,7,19,.38));
}
.glass{
background:linear-gradient(145deg,rgba(9,16,33,.88),rgba(3,7,18,.78));
backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
border:1px solid rgba(130,170,255,.22);
box-shadow:0 18px 55px rgba(0,0,0,.52),inset 0 1px 0 rgba(255,255,255,.06);
}
.topPanel{
position:absolute;z-index:20;
top:calc(env(safe-area-inset-top) + 10px);
left:10px;width:56%;
border-radius:22px;padding:10px;
}
.brandRow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.brand{font-size:16px;font-weight:950;white-space:nowrap}
.pill{
font-size:9px;font-weight:950;padding:5px 8px;border-radius:999px;
background:linear-gradient(135deg,#00eaff,#245bff);
}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:9px}
.metric{
border-radius:13px;text-align:center;padding:6px 3px;
background:rgba(255,255,255,.055);
border:1px solid rgba(255,255,255,.12);
}
.metric b{font-size:18px;font-weight:950;display:block}
.metric span{font-size:8px;color:#c7d4ee;font-weight:800}
.aiRow{margin-top:9px;display:flex;gap:8px;color:#e7ecff;font-size:11px;line-height:1.25}
.aiIcon{
min-width:28px;height:28px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
border:1px solid #00eaff;color:#00eaff;font-weight:950;font-size:12px;
}
.controls{
position:absolute;z-index:21;
top:calc(env(safe-area-inset-top) + 14px);
right:10px;width:27%;
display:flex;flex-direction:column;gap:8px;
}
.ctrl{
border:0;color:white;border-radius:16px;
padding:11px 5px;font-weight:950;font-size:11px;
background:linear-gradient(145deg,rgba(5,12,26,.92),rgba(2,6,16,.86));
border:1px solid rgba(155,190,255,.22);
}
.ctrl.primary{
background:linear-gradient(135deg,#00eaff,#125cff);
box-shadow:0 0 28px rgba(0,234,255,.32);
}
.compass{
position:absolute;z-index:22;left:14px;top:calc(env(safe-area-inset-top) + 182px);
width:58px;height:58px;border-radius:50%;
display:flex;align-items:center;justify-content:center;flex-direction:column;
font-size:25px;font-weight:950;
}
.compass:before{content:"▲";font-size:11px;color:#00eaff;margin-bottom:-2px}
.carCenter{
width:46px;height:46px;border-radius:50%;
background:linear-gradient(135deg,#00eaff,#126bff);
border:4px solid white;
display:flex;align-items:center;justify-content:center;
font-size:20px;color:white;
box-shadow:0 0 0 12px rgba(0,234,255,.12),0 0 30px rgba(0,234,255,.7);
}
.speedDial{
position:absolute;z-index:22;
left:18px;bottom:calc(env(safe-area-inset-bottom) + 142px);
width:104px;height:104px;border-radius:50%;
background:
radial-gradient(circle at 50% 50%,rgba(255,255,255,.92) 0%,rgba(0,234,255,.22) 30%,rgba(2,8,21,.96) 65%),
conic-gradient(from 0deg,#00eaff 0 75deg,transparent 75deg 360deg);
border:2px solid rgba(0,234,255,.75);
display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.speedDial b{font-size:36px;font-weight:1000}
.speedDial span{font-size:11px;color:#8ff7ff;font-weight:900}
.infoCard{
position:absolute;z-index:22;
left:145px;right:20px;
bottom:calc(env(safe-area-inset-bottom) + 155px);
border-radius:20px;padding:12px 14px;min-height:72px;
}
.infoTitle{font-size:15px;color:#00eaff;font-weight:950;margin-bottom:5px}
.infoText{font-size:12px;line-height:1.35;color:#e7ecff;padding-right:42px}
.infoBadge{
position:absolute;right:12px;top:50%;transform:translateY(-50%);
width:42px;height:42px;border-radius:50%;
border:2px solid #ff7845;color:#ffb184;
display:flex;align-items:center;justify-content:center;font-size:19px;
}
.nextBar{
position:absolute;z-index:22;
left:20px;right:20px;
bottom:calc(env(safe-area-inset-bottom) + 55px);
border-radius:21px;padding:13px;
}
.nextTop{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:950;gap:10px}
.progressWrap{margin-top:10px;height:7px;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden}
.progress{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#00eaff,#5f5cff,#ff8a00);transition:.35s}
.alert{
position:absolute;z-index:40;display:none;
left:14px;right:14px;bottom:calc(env(safe-area-inset-bottom) + 230px);
border-radius:20px;padding:14px;
background:linear-gradient(135deg,#ff1744,#ff8a00);
}
.alert h2{font-size:17px;margin-bottom:4px}
.alert p{font-size:12px}
.status{
position:absolute;z-index:22;left:14px;right:14px;
bottom:calc(env(safe-area-inset-bottom) + 16px);
font-size:10px;text-align:center;color:#b8c5df;opacity:.8;
}
.leaflet-control-attribution{opacity:.20!important;transform:scale(.6);transform-origin:bottom right}
</style>
</head>

<body>
<div id="map"></div>
<div class="mapShade"></div>

<div class="topPanel glass">
<div class="brandRow">
<div class="brand">DriveGuard AI</div>
<div class="pill">V11 LIVE</div>
</div>

<div class="metrics">
<div class="metric"><b id="speed">0</b><span>HIZ</span></div>
<div class="metric"><b id="limit">--</b><span>LİMİT</span></div>
<div class="metric"><b id="distance">--</b><span>MESAFE</span></div>
<div class="metric"><b id="risk">0</b><span>RİSK</span></div>
</div>

<div class="aiRow">
<div class="aiIcon">AI</div>
<div id="aiText">AI güvenli sürüş sistemi hazır.</div>
</div>
</div>

<div class="controls">
<button class="ctrl primary" onclick="startDrive()">▶ BAŞLAT</button>
<button class="ctrl" onclick="toggleVoice()">🔊 SES <span id="voiceState">AÇIK</span></button>
<button class="ctrl" onclick="toggleNight()">🌙 GECE</button>
<button class="ctrl" onclick="centerCar()">⌖ KONUM</button>
<button class="ctrl" onclick="savePoint()">✚ NOKTA</button>
</div>

<div class="compass glass" id="compass">N</div>

<div class="speedDial">
<b id="orbSpeed">0</b>
<span>KM/S</span>
</div>

<div class="infoCard glass">
<div class="infoTitle" id="infoTitle">Hazır</div>
<div class="infoText" id="infoText">Başlat butonuna basınca konum ve güvenlik analizi başlayacak.</div>
<div class="infoBadge" id="infoBadge">AI</div>
</div>

<div class="nextBar glass">
<div class="nextTop">
<div id="nextPoint">Yaklaşan nokta: --</div>
<div id="nextMeter">-- m</div>
</div>
<div class="progressWrap"><div class="progress" id="progress"></div></div>
</div>

<div class="alert" id="alertBox">
<h2 id="alertTitle">Uyarı</h2>
<p id="alertText">Yaklaşan güvenlik noktası.</p>
</div>

<div class="status" id="status">V11 Live Safe Network • Demo + Yerel Veri + Kullanıcı Noktaları</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map, carMarker, accuracyCircle, routeLine;
let currentLat=null,currentLng=null,currentHeading=0;
let voiceEnabled=true,lastWarn=0,watchId=null;
let routePoints=[];
let markerLayer=null;
let safetyPoints=[];

const saved = JSON.parse(localStorage.getItem("driveguard_points") || "[]");

const demoPoints = [
{name:"Ortalama Hız Koridoru",lat:38.6260,lng:27.4352,limit:70,type:"average",note:"Ortalama hız ölçüm alanı"},
{name:"EDS Hız Kamerası",lat:38.6191,lng:27.4289,limit:50,type:"camera",note:"Elektronik hız kontrol bölgesi"},
{name:"Okul Bölgesi",lat:38.6212,lng:27.4241,limit:30,type:"school",note:"Yaya geçişi yoğun alan"},
{name:"Tehlikeli Kavşak",lat:38.6157,lng:27.4315,limit:50,type:"danger",note:"Kaza riski yüksek kavşak"}
];

function initMap(){
map = L.map("map",{zoomControl:false,attributionControl:true})
.setView([38.6191,27.4289],16);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:20,
attribution:""
}).addTo(map);

drawDemoRoad();

routeLine = L.polyline([],{
color:"#00eaff",
weight:5,
opacity:.9
}).addTo(map);

markerLayer = L.layerGroup().addTo(map);

loadRadarNetwork();
}

async function loadRadarNetwork(){
setStatus("Veriler yükleniyor...");

let loaded = false;

try{
const res = await fetch("./radars.json?v=" + Date.now());
if(res.ok){
const data = await res.json();
if(Array.isArray(data.points)){
safetyPoints = normalizePoints(data.points);
loaded = true;
setStatus("Yerel radar verisi yüklendi: " + safetyPoints.length + " nokta");
}
}
}catch(e){}

if(!loaded){
safetyPoints = [...demoPoints];
setStatus("Demo güvenlik verisi aktif. radars.json eklenirse canlı veri kullanılır.");
}

safetyPoints = [...safetyPoints, ...saved];

drawSafetyPoints();
setDemoInfo();
}

function normalizePoints(arr){
return arr.map(x=>({
name:x.name || "Güvenlik Noktası",
lat:Number(x.lat),
lng:Number(x.lng),
limit:Number(x.limit || 50),
type:x.type || "camera",
note:x.note || "Güvenlik ve hız farkındalık noktası"
})).filter(x=>!Number.isNaN(x.lat) && !Number.isNaN(x.lng));
}

function setDemoInfo(){
if(!safetyPoints.length)return;
const p = safetyPoints[0];
setText("limit",p.limit);
setText("distance","--");
setText("risk","0");
setText("infoTitle",p.name);
setText("infoText",`${p.note} • Limit ${p.limit} km/s • Risk 0/100`);
setText("nextPoint","Yaklaşan nokta: " + p.name);
setText("nextMeter","-- m");
setText("infoBadge",styleFor(p.type).icon);
}

function drawDemoRoad(){
const road=[
[38.6138,27.4256],
[38.6164,27.4276],
[38.6191,27.4289],
[38.6220,27.4312],
[38.6268,27.4356]
];

L.polyline(road,{color:"#ff8a00",weight:15,opacity:.18}).addTo(map);
L.polyline(road,{color:"#ffb05a",weight:5,opacity:.45}).addTo(map);
}

function drawSafetyPoints(){
markerLayer.clearLayers();

safetyPoints.forEach(p=>{
const s = styleFor(p.type);
const icon = L.divIcon({
html:`<div style="
width:36px;height:36px;border-radius:50%;
background:${s.color};border:3px solid white;
display:flex;align-items:center;justify-content:center;
font-size:16px;box-shadow:0 0 18px ${s.color};
">${s.icon}</div>`,
className:"",
iconSize:[36,36],
iconAnchor:[18,18]
});

L.marker([p.lat,p.lng],{icon}).addTo(markerLayer)
.bindPopup(`<b>${p.name}</b><br>${p.note}<br>Limit ${p.limit} km/s`);
});
}

function styleFor(type){
if(type==="average") return {color:"#f58a1f",icon:"⏱"};
if(type==="camera") return {color:"#7c4dff",icon:"📷"};
if(type==="school") return {color:"#2878ff",icon:"🎓"};
if(type==="danger") return {color:"#ff273d",icon:"!"};
if(type==="user") return {color:"#00d97e",icon:"📍"};
return {color:"#00d97e",icon:"📍"};
}

function startDrive(){
if(!navigator.geolocation){
alert("Bu cihazda konum desteği yok.");
return;
}

if(watchId !== null){
centerCar();
return;
}

setStatus("Konum alınıyor...");

watchId = navigator.geolocation.watchPosition(
function(pos){
const lat = pos.coords.latitude;
const lng = pos.coords.longitude;
const speed = Math.round((pos.coords.speed || 0) * 3.6);
const acc = pos.coords.accuracy;
const h = pos.coords.heading;

currentLat = lat;
currentLng = lng;

if(h !== null && !Number.isNaN(h)){
currentHeading = h;
}

drawCar(lat,lng,acc,currentHeading);
updateRoute(lat,lng);
analyze(lat,lng,speed,currentHeading);

setStatus("Canlı sürüş analizi aktif • GPS doğruluk: " + Math.round(acc) + " m");
},
function(error){
alert("Konum izni gerekli: " + error.message);
setStatus("Konum izni bekleniyor.");
},
{
enableHighAccuracy:true,
maximumAge:1000,
timeout:10000
}
);
}

function drawCar(lat,lng,acc,heading){
const icon = L.divIcon({
html:`<div class="carCenter" style="transform:rotate(${heading}deg)">➤</div>`,
className:"",
iconSize:[46,46],
iconAnchor:[23,23]
});

if(!carMarker){
carMarker = L.marker([lat,lng],{icon}).addTo(map);
accuracyCircle = L.circle([lat,lng],{
radius:acc,
color:"#00eaff",
fillColor:"#00eaff",
fillOpacity:.08
}).addTo(map);
}else{
carMarker.setLatLng([lat,lng]);
carMarker.setIcon(icon);
accuracyCircle.setLatLng([lat,lng]);
accuracyCircle.setRadius(acc);
}

map.setView([lat,lng],17,{animate:true});
}

function updateRoute(lat,lng){
routePoints.push([lat,lng]);
if(routePoints.length > 250) routePoints.shift();
routeLine.setLatLngs(routePoints);
}

function analyze(lat,lng,speed,heading){
if(!safetyPoints.length)return;

const nearest = getNearestForward(lat,lng,heading);
const p = nearest.point;
const d = nearest.distance;
const limit = p.limit || 50;

let risk = 0;
if(d < 1500) risk += 8;
if(d < 1000) risk += 12;
if(d < 700) risk += 18;
if(d < 400) risk += 22;
if(speed > limit) risk += 25;
if(speed > limit + 15) risk += 18;
if(p.type === "school") risk += 14;
if(p.type === "danger") risk += 18;
risk = Math.max(0,Math.min(100,risk));

setText("speed",speed);
setText("orbSpeed",speed);
setText("limit",limit);
setText("distance",Math.round(d)+"m");
setText("risk",risk);
setText("compass",headingLabel(heading));
setText("nextPoint","Yaklaşan nokta: " + p.name);
setText("nextMeter",Math.round(d)+" m");
setText("infoTitle",p.name);
setText("infoText",`${p.note} • Limit ${limit} km/s • Risk ${risk}/100`);
setText("infoBadge",styleFor(p.type).icon);

let progress = 100 - Math.min(100,(d/2000)*100);
progress = Math.max(5,Math.min(100,progress));
document.getElementById("progress").style.width = progress + "%";

let msg = `${p.name} yaklaşık ${Math.round(d)} metre ileride.`;
if(speed > limit) msg += " Hız limitini aşıyorsun.";
else if(d < 500) msg += " Yaklaşan dikkat noktası var.";
else msg += " Sürüş stabil.";

setText("aiText",msg);

if(speed > limit){
warn("Hız Uyarısı",`Mevcut hız ${speed} km/s. Limit ${limit} km/s.`,"Hız limitini aşıyorsun. Güvenli şekilde yavaşla.");
}else if(d < 500){
warn(p.name,`${Math.round(d)} metre sonra. ${p.note}`,"Yaklaşan güvenlik noktası var. Dikkatli ilerle.");
}
}

function getNearestForward(lat,lng,heading){
let best = null;
let bestDistance = Infinity;

safetyPoints.forEach(p=>{
const d = distanceMeters(lat,lng,p.lat,p.lng);
const bearing = bearingTo(lat,lng,p.lat,p.lng);
const diff = angleDiff(heading,bearing);

if(d < bestDistance && (d < 250 || diff < 115)){
best = p;
bestDistance = d;
}
});

if(!best){
safetyPoints.forEach(p=>{
const d = distanceMeters(lat,lng,p.lat,p.lng);
if(d < bestDistance){
best = p;
bestDistance = d;
}
});
}

return {point:best,distance:bestDistance};
}

function warn(title,msg,voiceMsg){
const now = Date.now();
if(now - lastWarn < 9000) return;
lastWarn = now;

setText("alertTitle",title);
setText("alertText",msg);
document.getElementById("alertBox").style.display = "block";

if(voiceEnabled) speak(voiceMsg);
if(navigator.vibrate) navigator.vibrate([250,100,250]);

setTimeout(()=>{
document.getElementById("alertBox").style.display = "none";
},5000);
}

function speak(text){
if(!("speechSynthesis" in window)) return;
const u = new SpeechSynthesisUtterance(text);
u.lang = "tr-TR";
u.rate = .95;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

function toggleVoice(){
voiceEnabled = !voiceEnabled;
setText("voiceState",voiceEnabled ? "AÇIK" : "KAPALI");
}

function toggleNight(){
const shade = document.querySelector(".mapShade");
if(shade.style.background){
shade.style.background = "";
}else{
shade.style.background = "linear-gradient(to bottom,rgba(2,7,19,.45),rgba(2,7,19,.24),rgba(2,7,19,.60))";
}
}

function centerCar(){
if(currentLat && currentLng){
map.setView([currentLat,currentLng],17,{animate:true});
}
}

function savePoint(){
if(!currentLat || !currentLng){
alert("Önce BAŞLAT ile konum alın.");
return;
}

const name = prompt("Nokta adı","Dikkat Noktası");
if(!name) return;

saved.push({
name:name,
lat:currentLat,
lng:currentLng,
limit:50,
type:"user",
note:"Kullanıcı tarafından eklenen güvenlik noktası"
});

localStorage.setItem("driveguard_points",JSON.stringify(saved));
alert("Nokta kaydedildi. Sayfayı yenile.");
}

function headingLabel(d){
if(d === null || Number.isNaN(d)) return "N";
const arr = ["N","NE","E","SE","S","SW","W","NW"];
return arr[Math.round(d/45)%8];
}

function distanceMeters(lat1,lng1,lat2,lng2){
const R = 6371000;
const dLat = (lat2-lat1) * Math.PI / 180;
const dLng = (lng2-lng1) * Math.PI / 180;
const a =
Math.sin(dLat/2) ** 2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLng/2) ** 2;
return R * 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearingTo(lat1,lng1,lat2,lng2){
const y = Math.sin((lng2-lng1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
const x =
Math.cos(lat1*Math.PI/180) * Math.sin(lat2*Math.PI/180) -
Math.sin(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
Math.cos((lng2-lng1)*Math.PI/180);
return (Math.atan2(y,x) * 180 / Math.PI + 360) % 360;
}

function angleDiff(a,b){
if(a === null || Number.isNaN(a)) return 0;
let d = Math.abs(a-b) % 360;
return d > 180 ? 360-d : d;
}

function setText(id,val){
const el = document.getElementById(id);
if(el) el.innerText = val;
}

function setStatus(t){
setText("status",t);
}

initMap();
</script>
</body>
</html>
