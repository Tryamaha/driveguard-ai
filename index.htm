<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DriveGuard">
<meta name="theme-color" content="#050814">

<title>DriveGuard AI Ultimate V6</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#050814;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
}

#map{
  position:fixed;
  inset:0;
  z-index:1;
  background:#050814;
}

#map.night{
  filter:brightness(.38) contrast(1.45) saturate(.55)!important;
}

.glass{
  background:linear-gradient(145deg,rgba(14,20,38,.88),rgba(6,9,22,.78));
  backdrop-filter:blur(26px);
  -webkit-backdrop-filter:blur(26px);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 22px 80px rgba(0,0,0,.55);
}

.topDock{
  position:absolute;
  top:calc(env(safe-area-inset-top) + 10px);
  left:12px;
  right:12px;
  z-index:900;
  border-radius:28px;
  padding:14px;
  box-shadow:0 25px 90px rgba(0,0,0,.62), inset 0 1px 0 rgba(255,255,255,.08);
}

.brandRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  font-size:23px;
  font-weight:950;
  letter-spacing:-.5px;
}

.modePill{
  font-size:11px;
  font-weight:900;
  letter-spacing:.5px;
  padding:7px 12px;
  border-radius:999px;
  background:linear-gradient(135deg,#00e5ff,#7c4dff);
  box-shadow:0 0 24px rgba(0,229,255,.35);
}

.metrics{
  margin-top:13px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.metric{
  border-radius:18px;
  padding:10px 6px;
  text-align:center;
  background:rgba(255,255,255,.065);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}

.metricValue{
  font-size:24px;
  font-weight:950;
  letter-spacing:-.7px;
}

.metricLabel{
  margin-top:2px;
  font-size:10px;
  color:#aeb9d7;
  font-weight:700;
}

.aiText{
  margin-top:11px;
  color:#dfe7ff;
  font-size:13px;
  line-height:1.38;
}

.controlRail{
  position:absolute;
  right:12px;
  top:calc(env(safe-area-inset-top) + 198px);
  z-index:920;
  display:flex;
  flex-direction:column;
  gap:9px;
}

.ctrl{
  min-width:118px;
  border:0;
  color:#fff;
  font-weight:950;
  font-size:12px;
  padding:13px 12px;
  border-radius:18px;
  background:linear-gradient(145deg,rgba(12,17,34,.92),rgba(4,7,18,.86));
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 14px 35px rgba(0,0,0,.35);
}

.ctrl.primary{
  background:linear-gradient(135deg,#00e5ff,#0077ff)!important;
  box-shadow:0 0 28px rgba(0,229,255,.38);
}

.compass{
  position:absolute;
  left:14px;
  top:calc(env(safe-area-inset-top) + 198px);
  z-index:920;
  width:66px;
  height:66px;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
  font-weight:950;
}

.speedOrb{
  position:absolute;
  left:24px;
  bottom:calc(env(safe-area-inset-bottom) + 150px);
  z-index:910;
  width:116px;
  height:116px;
  border-radius:50%;
  background:
    radial-gradient(circle at 40% 35%,rgba(255,255,255,.92),rgba(0,229,255,.35) 28%,rgba(3,9,22,.95) 70%);
  border:2px solid rgba(0,229,255,.55);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 42px rgba(0,229,255,.35);
}

.orbSpeed{
  font-size:43px;
  font-weight:1000;
}

.orbLabel{
  font-size:11px;
  color:#c7f5ff;
  font-weight:800;
}

.infoCard{
  position:absolute;
  left:168px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 154px);
  z-index:910;
  border-radius:24px;
  padding:14px;
  font-size:13px;
  line-height:1.35;
  color:#e4ebff;
}

.nextBar{
  position:absolute;
  left:12px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 58px);
  z-index:910;
  border-radius:24px;
  padding:14px 16px;
}

.nextTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  font-size:13px;
  font-weight:850;
}

.progressWrap{
  margin-top:10px;
  height:7px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#00e5ff,#7c4dff,#ff9800);
  transition:width .35s ease;
}

.alert{
  position:absolute;
  left:12px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 214px);
  z-index:1200;
  display:none;
  border-radius:28px;
  padding:17px;
  background:linear-gradient(135deg,#ff1744,#ff9800);
  box-shadow:0 25px 90px rgba(255,23,68,.55);
}

.alert h2{
  font-size:21px;
  margin-bottom:5px;
}

.alert p{
  font-size:14px;
  line-height:1.35;
}

.aiBubble{
  position:absolute;
  left:12px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 285px);
  z-index:1190;
  display:none;
  border-radius:28px;
  padding:16px;
  animation:aiSlide .35s ease;
}

@keyframes aiSlide{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

.aiBubbleTitle{
  font-weight:950;
  margin-bottom:5px;
}

.aiBubbleMsg{
  color:#dfe7ff;
  font-size:13px;
  line-height:1.35;
}

.carPulse{
  animation:carPulse 1.4s infinite;
}

@keyframes carPulse{
  0%{box-shadow:0 0 0 0 rgba(0,229,255,.55)}
  70%{box-shadow:0 0 0 18px rgba(0,229,255,0)}
  100%{box-shadow:0 0 0 0 rgba(0,229,255,0)}
}

.leaflet-control-attribution{
  transform:scale(.65);
  transform-origin:bottom right;
  opacity:.25!important;
  font-size:10px!important;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="topDock glass">
  <div class="brandRow">
    <div class="brand">DriveGuard AI Ultimate</div>
    <div class="modePill">SAFE AI</div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metricValue" id="speed">0</div>
      <div class="metricLabel">HIZ</div>
    </div>
    <div class="metric">
      <div class="metricValue" id="limit">--</div>
      <div class="metricLabel">LİMİT</div>
    </div>
    <div class="metric">
      <div class="metricValue" id="distance">--</div>
      <div class="metricLabel">MESAFE</div>
    </div>
    <div class="metric">
      <div class="metricValue" id="risk">0</div>
      <div class="metricLabel">RİSK</div>
    </div>
  </div>

  <div class="aiText" id="aiText">
    AI güvenli sürüş sistemi hazır. Başlat butonuna basınca canlı analiz başlayacak.
  </div>
</div>

<div class="controlRail">
  <button class="ctrl primary" onclick="startDrive()">BAŞLAT</button>
  <button class="ctrl" onclick="toggleVoice()">SES <span id="voiceState">AÇIK</span></button>
  <button class="ctrl" onclick="toggleNight()">GECE</button>
  <button class="ctrl" onclick="centerCar()">KONUM</button>
  <button class="ctrl" onclick="savePoint()">NOKTA EKLE</button>
</div>

<div class="compass glass" id="compass">N</div>

<div class="speedOrb">
  <div class="orbSpeed" id="orbSpeed">0</div>
  <div class="orbLabel">KM/S</div>
</div>

<div class="infoCard glass" id="infoCard">
  En yakın güvenlik noktası analiz ediliyor.
</div>

<div class="nextBar glass">
  <div class="nextTop">
    <div id="nextPoint">Yaklaşan nokta: --</div>
    <div id="nextMeter">-- m</div>
  </div>
  <div class="progressWrap">
    <div class="progress" id="progress"></div>
  </div>
</div>

<div class="alert" id="alertBox">
  <h2 id="alertTitle">Uyarı</h2>
  <p id="alertText">Yaklaşan güvenlik noktası.</p>
</div>

<div class="aiBubble glass" id="aiBubble">
  <div class="aiBubbleTitle">DriveGuard AI</div>
  <div class="aiBubbleMsg" id="aiBubbleMsg">Sürüş analizi hazırlanıyor.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let carMarker;
let accuracyCircle;
let routeLine;
let traveled = [];
let currentLat = null;
let currentLng = null;
let currentHeading = 0;
let voiceEnabled = true;
let lastWarn = 0;
let aiBubbleTimer = null;

let userSavedPoints = JSON.parse(localStorage.getItem("driveguard_points") || "[]");

const safetyPoints = [
  {name:"EDS Hız Kamerası",lat:38.6191,lng:27.4289,limit:50,type:"camera",note:"Elektronik hız kontrol bölgesi"},
  {name:"Okul Bölgesi",lat:38.6212,lng:27.4241,limit:30,type:"school",note:"Yaya ve öğrenci geçişi yoğun"},
  {name:"Tehlikeli Kavşak",lat:38.6157,lng:27.4315,limit:50,type:"danger",note:"Kaza riski yüksek kavşak"},
  {name:"Ortalama Hız Koridoru",lat:38.6260,lng:27.4352,limit:70,type:"average",note:"Ortalama hız ölçüm alanı"},
  ...userSavedPoints
];

function initMap(){
  map = L.map("map",{
    zoomControl:false,
    attributionControl:true
  }).setView([38.6191,27.4289],15);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19
  }).addTo(map);

  drawSafetyPoints();

  routeLine = L.polyline([],{
    color:"#00e5ff",
    weight:6,
    opacity:.8
  }).addTo(map);
}

function drawSafetyPoints(){
  safetyPoints.forEach(p=>{
    const color =
      p.type==="school" ? "#00e5ff" :
      p.type==="danger" ? "#ff1744" :
      p.type==="average" ? "#ff9800" :
      p.type==="user" ? "#00ff90" : "#7c4dff";

    const emoji =
      p.type==="school" ? "🏫" :
      p.type==="danger" ? "⚠️" :
      p.type==="average" ? "⏱️" :
      p.type==="user" ? "📍" : "📷";

    const icon = L.divIcon({
      html:`
      <div style="
        width:34px;
        height:34px;
        border-radius:50%;
        background:${color};
        border:3px solid white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:15px;
        box-shadow:0 0 24px ${color};
      ">${emoji}</div>`,
      className:"",
      iconSize:[34,34],
      iconAnchor:[17,17]
    });

    L.marker([p.lat,p.lng],{icon}).addTo(map)
      .bindPopup("<b>"+p.name+"</b><br>"+p.note+"<br>Limit: "+p.limit+" km/s");
  });
}

function startDrive(){
  if(!navigator.geolocation){
    alert("Konum desteği yok.");
    return;
  }

  navigator.geolocation.watchPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const speed = Math.round((pos.coords.speed || 0) * 3.6);
    const acc = pos.coords.accuracy;
    const heading = pos.coords.heading;

    currentLat = lat;
    currentLng = lng;

    if(heading !== null && !Number.isNaN(heading)){
      currentHeading = heading;
    }

    drawCar(lat,lng,acc,currentHeading);
    updateRoute(lat,lng);
    analyze(lat,lng,speed,currentHeading);

  },err=>{
    alert("Konum izni gerekli: " + err.message);
  },{
    enableHighAccuracy:true,
    maximumAge:1000,
    timeout:10000
  });
}

function drawCar(lat,lng,acc,heading){
  const carIcon = L.divIcon({
    html:`
      <div class="carPulse" style="
        width:46px;
        height:46px;
        border-radius:50%;
        background:linear-gradient(135deg,#00e5ff,#0070ff);
        border:4px solid white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:22px;
        transform:rotate(${heading}deg);
      ">➤</div>
    `,
    className:"",
    iconSize:[46,46],
    iconAnchor:[23,23]
  });

  if(!carMarker){
    carMarker = L.marker([lat,lng],{icon:carIcon}).addTo(map);
    accuracyCircle = L.circle([lat,lng],{
      radius:acc,
      color:"#00e5ff",
      fillColor:"#00e5ff",
      fillOpacity:.10
    }).addTo(map);
    map.setView([lat,lng],18);
  }else{
    carMarker.setLatLng([lat,lng]);
    carMarker.setIcon(carIcon);
    accuracyCircle.setLatLng([lat,lng]);
    accuracyCircle.setRadius(acc);
  }

  map.setView([lat,lng],18,{animate:true});
}

function updateRoute(lat,lng){
  traveled.push([lat,lng]);
  if(traveled.length > 250) traveled.shift();
  routeLine.setLatLngs(traveled);
}

function analyze(lat,lng,speed,heading){
  document.getElementById("speed").innerText = speed;
  document.getElementById("orbSpeed").innerText = speed;

  const nearest = getNearest(lat,lng);
  const p = nearest.point;
  const d = nearest.distance;
  const limit = p.limit || 50;

  let risk = 0;

  if(d < 1500) risk += 8;
  if(d < 1000) risk += 12;
  if(d < 700) risk += 18;
  if(d < 400) risk += 22;
  if(speed > limit) risk += 22;
  if(speed > limit + 15) risk += 18;
  if(p.type === "school") risk += 14;
  if(p.type === "danger") risk += 18;

  risk = Math.min(100,risk);

  document.getElementById("limit").innerText = limit;
  document.getElementById("distance").innerText = Math.round(d) + "m";
  document.getElementById("risk").innerText = risk;
  document.getElementById("compass").innerText = headingLabel(heading);

  document.getElementById("nextPoint").innerText = "Yaklaşan nokta: " + p.name;
  document.getElementById("nextMeter").innerText = Math.round(d) + " m";

  let prog = 100 - Math.min(100,(d/2000)*100);
  if(d < 1000) prog += 10;
  if(d < 500) prog += 15;
  prog = Math.min(100, prog);

  document.getElementById("progress").style.width = prog + "%";

  let aiMsg = `AI Analiz: ${p.name} yaklaşık ${Math.round(d)} metre ileride. `;
  if(speed > limit){
    aiMsg += `Hız limitinin üzerindesin. Güvenli şekilde yavaşla.`;
  }else if(d < 500){
    aiMsg += `Yaklaşan dikkat noktası mevcut. Kontrollü ilerle.`;
  }else{
    aiMsg += `Sürüş stabil. Risk düşük.`;
  }

  document.getElementById("aiText").innerText = aiMsg;
  document.getElementById("infoCard").innerText =
    `${p.name} • ${p.note} • Limit ${limit} km/s • AI risk ${risk}/100`;

  if(risk > 15 || d < 900){
    aiBubble(aiMsg);
  }

  if(speed > limit){
    warn("Hız Uyarısı",`Mevcut hız ${speed} km/s. Limit ${limit} km/s.`,"Hız limitinin üzerindesin. Güvenli şekilde yavaşla.");
  }else if(d < 500){
    warn(p.name,`${Math.round(d)} metre sonra. ${p.note}`,"Yaklaşan güvenlik noktası var. Dikkatli ilerle.");
  }
}

function getNearest(lat,lng){
  let np = safetyPoints[0];
  let nd = Infinity;

  safetyPoints.forEach(p=>{
    const dist = meterDistance(lat,lng,p.lat,p.lng);
    if(dist < nd){
      nd = dist;
      np = p;
    }
  });

  return {point:np,distance:nd};
}

function aiBubble(text){
  const bubble = document.getElementById("aiBubble");
  document.getElementById("aiBubbleMsg").innerText = text;
  bubble.style.display = "block";

  clearTimeout(aiBubbleTimer);
  aiBubbleTimer = setTimeout(()=>{
    bubble.style.display = "none";
  },3500);
}

function warn(title,msg,voiceMsg){
  const now = Date.now();
  if(now - lastWarn < 9000) return;
  lastWarn = now;

  document.getElementById("alertTitle").innerText = title;
  document.getElementById("alertText").innerText = msg;
  document.getElementById("alertBox").style.display = "block";

  if(voiceEnabled) speak(voiceMsg);
  if(navigator.vibrate) navigator.vibrate([250,100,250]);

  setTimeout(()=>{
    document.getElementById("alertBox").style.display = "none";
  },6000);
}

function speak(text){
  if(!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "tr-TR";
  u.rate = .95;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function toggleVoice(){
  voiceEnabled = !voiceEnabled;
  document.getElementById("voiceState").innerText = voiceEnabled ? "AÇIK" : "KAPALI";
}

function toggleNight(){
  document.getElementById("map").classList.toggle("night");
}

function centerCar(){
  if(currentLat && currentLng){
    map.setView([currentLat,currentLng],18,{animate:true});
  }
}

function savePoint(){
  if(!currentLat || !currentLng){
    alert("Önce BAŞLAT ile konum alın.");
    return;
  }

  const name = prompt("Nokta adı:", "Dikkat Noktası");
  if(!name) return;

  const point = {
    name:name,
    lat:currentLat,
    lng:currentLng,
    limit:50,
    type:"user",
    note:"Kullanıcı tarafından eklenen güvenlik noktası"
  };

  userSavedPoints.push(point);
  localStorage.setItem("driveguard_points",JSON.stringify(userSavedPoints));
  alert("Nokta kaydedildi. Sayfayı yenile.");
}

function headingLabel(deg){
  if(deg===null || Number.isNaN(deg)) return "N";
  const dirs=["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round(deg/45)%8];
}

function meterDistance(lat1,lng1,lat2,lng2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);

  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

initMap();
</script>

</body>
</html>
